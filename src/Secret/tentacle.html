<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #020617;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    padding: 24px 16px;
    color: #e0f2fe;
  }
  h1 {
    color: #7dd3fc;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 4px;
    text-shadow: 0 0 16px #38bdf8;
  }
  .subtitle { color: #475569; font-size: 12px; margin-bottom: 16px; }
  canvas { display: block; }
  .input-row {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 420px;
    margin-top: 8px;
  }
  input {
    flex: 1;
    background: #0f172a;
    border: 1.5px solid #1e3a5f;
    border-radius: 10px;
    color: #e0f2fe;
    padding: 10px 14px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #38bdf8; }
  input:disabled { opacity: 0.4; cursor: not-allowed; }
  button#addBtn {
    background: #0c4a6e;
    border: 1.5px solid #38bdf8;
    border-radius: 10px;
    color: #7dd3fc;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button#addBtn:hover:not(:disabled) { background: #0e5a88; }
  button#addBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  .stats {
    margin-top: 14px;
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: #475569;
  }
  .stats b { color: #7dd3fc; }
  .stats .done-count { color: #4ade80; }
  .stats .free-count { color: #94a3b8; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="input-row">
  <input id="taskInput" type="text" placeholder="New task for a tentacle..." maxlength="40" />
  <button id="addBtn">Grab</button>
</div>
<div class="stats">
  <span>🔵 Active: <b id="activeCount">0</b></span>
  <span>🟢 Done: <b class="done-count" id="doneCount">0</b></span>
  <span>🦾 Free arms: <b class="free-count" id="freeCount">8</b></span>
</div>

<script>
const NUM = 8;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 600, H = 600;
canvas.width = W; canvas.height = H;
const CX = W / 2, CY = H / 2, HUB_R = 54, ARM_LEN = 175;

let tasks = []; // {id, text, done, slot}
let phase = 0;
let nextId = 1;

// --- Bezier helpers ---
function bezier(p0, p1, p2, p3, t) {
  const u = 1 - t;
  return {
    x: u**3*p0.x + 3*u**2*t*p1.x + 3*u*t**2*p2.x + t**3*p3.x,
    y: u**3*p0.y + 3*u**2*t*p1.y + 3*u*t**2*p2.y + t**3*p3.y,
  };
}

function getArm(i, ph) {
  const a = (i / NUM) * Math.PI * 2 - Math.PI / 2;
  const task = tasks.find(t => t.slot === i);
  const busy = task && !task.done;
  const w1 = Math.sin(ph + i * 1.1) * (busy ? 7 : 22);
  const w2 = Math.cos(ph * 0.7 + i) * (busy ? 5 : 16);
  const p0 = { x: CX + Math.cos(a) * HUB_R, y: CY + Math.sin(a) * HUB_R };
  const p1 = {
    x: p0.x + Math.cos(a) * ARM_LEN * 0.33 + Math.cos(a + Math.PI/2) * w1,
    y: p0.y + Math.sin(a) * ARM_LEN * 0.33 + Math.sin(a + Math.PI/2) * w1,
  };
  const p2 = {
    x: p0.x + Math.cos(a) * ARM_LEN * 0.66 + Math.cos(a + Math.PI/2) * w2,
    y: p0.y + Math.sin(a) * ARM_LEN * 0.66 + Math.sin(a + Math.PI/2) * w2,
  };
  const p3 = {
    x: p0.x + Math.cos(a) * ARM_LEN + Math.cos(a + Math.PI/2) * w1 * 0.4,
    y: p0.y + Math.sin(a) * ARM_LEN + Math.sin(a + Math.PI/2) * w1 * 0.4,
  };
  return { p0, p1, p2, p3, a, task };
}

// Tooltip / action overlay state
let hoveredTask = null;
let tooltipPos = null;

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Hub glow
  const hg = ctx.createRadialGradient(CX, CY, 30, CX, CY, 80);
  hg.addColorStop(0, 'rgba(56,189,248,0.12)');
  hg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = hg;
  ctx.beginPath(); ctx.arc(CX, CY, 80, 0, Math.PI*2); ctx.fill();

  const full = tasks.filter(t => !t.done).length >= NUM;

  // Draw arms
  for (let i = 0; i < NUM; i++) {
    const { p0, p1, p2, p3, a, task } = getArm(i, phase);
    const done = task && task.done;
    const active = task && !task.done;
    const color = done ? '#4ade80' : active ? '#38bdf8' : '#475569';
    const glow = done ? '#4ade8044' : active ? '#38bdf844' : 'transparent';

    // Arm glow
    ctx.save();
    ctx.strokeStyle = glow;
    ctx.lineWidth = 10;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y);
    ctx.bezierCurveTo(p1.x, p1.y, p2.x, p2.y, p3.x, p3.y);
    ctx.stroke();
    ctx.restore();

    // Arm body
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y);
    ctx.bezierCurveTo(p1.x, p1.y, p2.x, p2.y, p3.x, p3.y);
    ctx.stroke();
    ctx.restore();

    // Segment rings
    [0.2, 0.4, 0.6, 0.8].forEach((t, si) => {
      const pt = bezier(p0, p1, p2, p3, t);
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 4.5 - si*0.5, 0, Math.PI*2);
      ctx.fillStyle = '#0f172a';
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });

    // Claw
    const clawA = Math.atan2(p3.y - p2.y, p3.x - p2.x);
    const spread = active ? 0.18 : 0.44;
    [-1, 1].forEach(side => {
      const cx2 = p3.x + Math.cos(clawA + side * spread) * 20;
      const cy2 = p3.y + Math.sin(clawA + side * spread) * 20;
      ctx.beginPath();
      ctx.moveTo(p3.x, p3.y);
      ctx.lineTo(cx2, cy2);
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.stroke();
    });

    // Task bubble
    if (task) {
      const bx = p3.x + Math.cos(a) * 30;
      const by = p3.y + Math.sin(a) * 30;
      const bw = 110, bh = 36;
      const bxOff = bx - bw / 2;
      const byOff = by - bh / 2;
      const hovered = hoveredTask === task.id;

      // Bubble bg
      ctx.save();
      ctx.fillStyle = done ? 'rgba(20,83,45,0.93)' : 'rgba(12,26,52,0.93)';
      ctx.strokeStyle = done ? '#4ade80' : '#38bdf8';
      ctx.lineWidth = hovered ? 2 : 1.5;
      roundRect(ctx, bxOff, byOff, bw, bh, 9);
      ctx.fill(); ctx.stroke();
      ctx.restore();

      // Task text
      ctx.save();
      ctx.fillStyle = done ? '#bbf7d0' : '#e0f2fe';
      ctx.font = `${done ? 'italic ' : ''}11px Segoe UI`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      let label = task.text;
      if (label.length > 15) label = label.slice(0, 14) + '…';
      ctx.fillText(label, bx, by - 6);
      ctx.restore();

      // Action buttons text
      ctx.save();
      ctx.font = '10px Segoe UI';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      if (!done) {
        ctx.fillStyle = '#4ade80';
        ctx.fillText('✓ Done', bx - 22, by + 10);
        ctx.fillStyle = '#f87171';
        ctx.fillText('✕', bx + 30, by + 10);
      } else {
        ctx.fillStyle = '#f87171';
        ctx.fillText('✕ Remove', bx, by + 10);
      }
      ctx.restore();

      // Store hit area for click detection
      task._bx = bxOff; task._by = byOff; task._bw = bw; task._bh = bh;
      task._bx_center = bx;
    } else {
      const pt = p3;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, 6, 0, Math.PI*2);
      ctx.fillStyle = '#0f172a';
      ctx.fill();
      ctx.strokeStyle = '#334155';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // Hub body
  ctx.beginPath(); ctx.arc(CX, CY, HUB_R, 0, Math.PI*2);
  ctx.fillStyle = '#0c1a2e'; ctx.fill();
  ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 2.5; ctx.stroke();

  ctx.beginPath(); ctx.arc(CX, CY, 32, 0, Math.PI*2);
  ctx.fillStyle = '#071020'; ctx.fill();
  ctx.strokeStyle = '#1e3a5f'; ctx.lineWidth = 1.5; ctx.stroke();

  const pulse = 14 + Math.sin(phase * 2) * 3;
  ctx.beginPath(); ctx.arc(CX, CY, pulse, 0, Math.PI*2);
  ctx.fillStyle = full ? '#7f1d1d' : '#0f2d4a'; ctx.fill();
  ctx.strokeStyle = full ? '#f87171' : '#38bdf8'; ctx.lineWidth = 2; ctx.stroke();

  ctx.font = '18px Segoe UI';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = full ? '#fca5a5' : '#7dd3fc';
  ctx.fillText(full ? '!' : '⚙', CX, CY + 1);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function updateStats() {
  const active = tasks.filter(t => !t.done).length;
  const done = tasks.filter(t => t.done).length;
  document.getElementById('activeCount').textContent = active;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('freeCount').textContent = Math.max(0, NUM - active);
  const full = active >= NUM;
  const inp = document.getElementById('taskInput');
  const btn = document.getElementById('addBtn');
  inp.disabled = full;
  inp.placeholder = full ? 'All tentacles occupied!' : 'New task for a tentacle...';
  btn.disabled = full;
}

function addTask() {
  const inp = document.getElementById('taskInput');
  const text = inp.value.trim();
  if (!text) return;
  const activeSlots = tasks.filter(t => !t.done).map(t => t.slot);
  let slot = -1;
  for (let i = 0; i < NUM; i++) { if (!activeSlots.includes(i)) { slot = i; break; } }
  if (slot === -1) return;
  tasks.push({ id: nextId++, text, done: false, slot });
  inp.value = '';
  updateStats();
}

document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  for (const task of tasks) {
    if (!task._bx) continue;
    if (mx >= task._bx && mx <= task._bx + task._bw && my >= task._by && my <= task._by + task._bh) {
      const relX = mx - task._bx_center;
      const relY = my - (task._by + task._bh / 2);
      if (relY > 0) { // bottom half = buttons
        if (!task.done && relX < 0) {
          task.done = true;
        } else {
          tasks = tasks.filter(t => t.id !== task.id);
        }
        updateStats();
      }
      break;
    }
  }
});

function loop(ts) {
  phase = ts * 0.001;
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
updateStats();
</script>
</body>
</html>
