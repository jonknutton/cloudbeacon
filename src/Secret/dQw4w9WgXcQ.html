<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOM — SLAYER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #ffff00;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
        }

        #container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            animation: flicker 0.2s infinite;
        }

        .title {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 6px;
            color: #ff0000;
            text-shadow: 0 0 15px #ff0000;
        }

        .subtitle {
            font-size: 12px;
            letter-spacing: 2px;
            color: #ff3333;
            margin-top: 5px;
            text-transform: uppercase;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.9; }
        }

        #canvas {
            flex: 1;
            display: block;
            margin: 0 auto;
            border: 2px solid #ff0000;
            border-radius: 0;
            background: #1a0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5), inset 0 0 15px rgba(255, 0, 0, 0.2);
        }

        .hud {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding: 10px;
            border: 2px solid #ff0000;
            background: #1a0000;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }

        .hud-item {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .hud-label {
            color: #ff3333;
            font-weight: bold;
        }

        .hud-value {
            color: #ffff00;
            min-width: 80px;
            font-family: 'Courier New', monospace;
        }

        .health-bar {
            height: 20px;
            width: 300px;
            border: 1px solid #ff0000;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(to right, #ff0000 0%, #ffff00 50%, #ff0000 100%);
            width: 100%;
            transition: width 0.1s;
            box-shadow: 0 0 10px currentColor;
        }

        .instructions {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
            color: #ff3333;
            letter-spacing: 1px;
        }

        .game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ff0000;
            padding: 40px;
            text-align: center;
            z-index: 1000;
            font-size: 24px;
            color: #ff0000;
        }

        .game-over h1 {
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff0000;
        }

        .game-over p {
            margin: 10px 0;
            color: #ffff00;
            font-size: 18px;
        }

        .game-over .final-score {
            color: #ffff00;
            font-size: 28px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="header">
            <div class="title">☠ HELL SLAYER ☠</div>
            <div class="subtitle">DESCENT INTO DARKNESS</div>
        </div>

        <canvas id="canvas"></canvas>

        <div class="hud">
            <div class="hud-item">
                <span class="hud-label">SCORE:</span>
                <span class="hud-value" id="score">0000000</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">HEALTH:</span>
                <div>
                    <div class="health-bar">
                        <div class="health-fill" id="healthFill"></div>
                    </div>
                </div>
            </div>
            <div class="hud-item">
                <span class="hud-label">WAVE:</span>
                <span class="hud-value" id="waveNum">1</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">ENEMIES:</span>
                <span class="hud-value" id="enemyCount">0</span>
            </div>
        </div>

        <div class="instructions">
            ← → ↑ ↓ to move • SPACEBAR to fire • ESC to exit
        </div>
    </div>

    <div class="game-over" id="gameOverScreen">
        <h1>GAME OVER</h1>
        <p>Final Score:</p>
        <div class="final-score" id="finalScore">0000000</div>
        <p style="margin-top: 20px; font-size: 14px;">Press ESC to return to main page</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Responsive canvas
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height - 100;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game constants
        const TILE_SIZE = 32;
        const GRID_WIDTH = Math.floor(canvas.width / TILE_SIZE);
        const GRID_HEIGHT = Math.floor(canvas.height / TILE_SIZE);

        // Demons types
        const DEMON_TYPES = {
            IMP: { symbol: '👹', health: 20, speed: 1.5, damage: 10, color: '#ff6600' },
            CACODEMON: { symbol: '🔴', health: 50, speed: 1, damage: 20, color: '#ff0000' },
            CYBERDEMON: { symbol: '⬢', health: 100, speed: 0.8, damage: 30, color: '#ff3333' }
        };

        // Game state
        const state = {
            player: {
                x: GRID_WIDTH / 2,
                y: GRID_HEIGHT / 2,
                vx: 0,
                vy: 0,
                speed: 2,
                health: 100,
                armor: 50,
                ammo: 100
            },
            demons: [],
            projectiles: [],
            particles: [],
            walls: [],
            time: 0,
            score: 0,
            level: 1,
            gameOver: false,
            waveStartTime: 0
        };

        // Initialize maze walls
        function generateMaze() {
            state.walls = [];
            
            // Outer walls
            for (let x = 0; x < GRID_WIDTH; x++) {
                state.walls.push({x, y: 0});
                state.walls.push({x, y: GRID_HEIGHT - 1});
            }
            for (let y = 0; y < GRID_HEIGHT; y++) {
                state.walls.push({x: 0, y});
                state.walls.push({x: GRID_WIDTH - 1, y});
            }

            // Random internal walls (maze-like)
            for (let i = 0; i < Math.floor(GRID_WIDTH * GRID_HEIGHT * 0.15); i++) {
                const x = Math.floor(Math.random() * (GRID_WIDTH - 4)) + 2;
                const y = Math.floor(Math.random() * (GRID_HEIGHT - 4)) + 2;
                
                // Create wall segments
                for (let j = 0; j < 3; j++) {
                    if (x + j < GRID_WIDTH - 1 && y < GRID_HEIGHT - 1) {
                        state.walls.push({x: x + j, y});
                    }
                }
            }
        }

        // Demon class
        class Demon {
            constructor(x, y, type) {
                const typeData = DEMON_TYPES[type];
                this.x = x;
                this.y = y;
                this.type = type;
                this.health = typeData.health;
                this.maxHealth = typeData.health;
                this.speed = typeData.speed;
                this.damage = typeData.damage;
                this.color = typeData.color;
                this.fireCounter = 0;
                this.moveCounter = 0;
                this.alive = true;
            }

            update() {
                this.moveCounter++;
                this.fireCounter++;

                // Pathfinding - simple approach toward player
                const dx = state.player.x - this.x;
                const dy = state.player.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 0 && this.moveCounter % Math.floor(3 / this.speed) === 0) {
                    const moveX = Math.sign(dx);
                    const moveY = Math.sign(dy);
                    
                    // Check for walls
                    const newX = this.x + moveX;
                    const newY = this.y + moveY;
                    
                    if (!state.walls.find(w => w.x === newX && w.y === newY)) {
                        this.x = Math.max(1, Math.min(GRID_WIDTH - 2, newX));
                        this.y = Math.max(1, Math.min(GRID_HEIGHT - 2, newY));
                    }
                }

                // Fire at player if close
                if (dist < 8 && this.fireCounter > 30) {
                    this.fireCounter = 0;
                    const angle = Math.atan2(dy, dx);
                    state.projectiles.push({
                        x: this.x,
                        y: this.y,
                        vx: Math.cos(angle) * 1.5,
                        vy: Math.sin(angle) * 1.5,
                        isEnemy: true,
                        damage: this.damage
                    });
                }
            }

            draw() {
                const screenX = this.x * TILE_SIZE;
                const screenY = this.y * TILE_SIZE;
                
                // Health bar above demon
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(screenX - 10, screenY - 15, 20 * (this.health / this.maxHealth), 3);

                ctx.fillStyle = this.color;
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('☠', screenX + TILE_SIZE / 2, screenY + TILE_SIZE / 2);
            }
        }

        // Particle class
        class Particle {
            constructor(x, y, vx, vy, life, color) {
                this.x = x * TILE_SIZE + TILE_SIZE / 2;
                this.y = y * TILE_SIZE + TILE_SIZE / 2;
                this.vx = vx || (Math.random() - 0.5) * 6;
                this.vy = vy || (Math.random() - 0.5) * 6;
                this.life = life || 40;
                this.maxLife = life || 40;
                this.color = color || '#ffff00';
                this.size = 4;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
            }

            draw() {
                const alpha = this.life / this.maxLife;
                ctx.fillStyle = this.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        // Input handling
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') e.preventDefault();
            if (e.code === 'Escape') {
                if (state.gameOver || confirm('Exit DOOM?')) window.history.back();
            }
        });
        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // Update game
        function update() {
            if (state.gameOver) return;

            state.time++;

            // 4-directional movement
            state.player.vx = 0;
            state.player.vy = 0;
            if (keys['ArrowLeft']) state.player.vx = -state.player.speed;
            if (keys['ArrowRight']) state.player.vx = state.player.speed;
            if (keys['ArrowUp']) state.player.vy = -state.player.speed;
            if (keys['ArrowDown']) state.player.vy = state.player.speed;

            // Collision with walls
            const newX = state.player.x + state.player.vx;
            const newY = state.player.y + state.player.vy;

            if (!state.walls.find(w => w.x === Math.round(newX) && w.y === Math.round(newY))) {
                state.player.x = Math.max(1, Math.min(GRID_WIDTH - 2, newX));
                state.player.y = Math.max(1, Math.min(GRID_HEIGHT - 2, newY));
            }

            // Fire
            if (keys['Space']) {
                if (!keys['_lastFire'] && state.player.ammo > 0) {
                    keys['_lastFire'] = true;
                    state.player.ammo--;
                    
                    // Fire in 8 directions spread
                    for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 4) {
                        state.projectiles.push({
                            x: state.player.x,
                            y: state.player.y,
                            vx: Math.cos(angle) * 2.5,
                            vy: Math.sin(angle) * 2.5,
                            isEnemy: false
                        });
                    }
                }
            } else {
                keys['_lastFire'] = false;
            }

            // Update projectiles
            state.projectiles = state.projectiles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;

                // Check wall collision
                if (state.walls.find(w => w.x === Math.round(p.x) && w.y === Math.round(p.y))) {
                    return false;
                }

                // Check demon hits
                if (!p.isEnemy) {
                    for (let i = state.demons.length - 1; i >= 0; i--) {
                        const d = state.demons[i];
                        if (Math.abs(p.x - d.x) < 1 && Math.abs(p.y - d.y) < 1) {
                            d.health -= 25;
                            if (d.health <= 0) {
                                d.alive = false;
                                state.score += 250;
                                for (let j = 0; j < 8; j++) {
                                    state.particles.push(new Particle(d.x, d.y, null, null, 40, '#ff6600'));
                                }
                            }
                            return false;
                        }
                    }
                } else {
                    // Enemy projectile hits player
                    if (Math.abs(p.x - state.player.x) < 0.5 && Math.abs(p.y - state.player.y) < 0.5) {
                        const damage = p.damage || 10;
                        if (state.player.armor > 0) {
                            state.player.armor -= damage;
                        } else {
                            state.player.health -= damage;
                        }
                        return false;
                    }
                }

                return Math.abs(p.x) < GRID_WIDTH + 1 && Math.abs(p.y) < GRID_HEIGHT + 1;
            });

            // Update demons
            state.demons = state.demons.filter(d => {
                if (d.alive) d.update();
                return d.alive;
            });

            // Level progression
            if (state.demons.length === 0 && state.time - state.waveStartTime > 120) {
                state.level++;
                state.player.health = Math.min(100, state.player.health + 25);
                state.player.ammo += 50;
                state.waveStartTime = state.time;
                spawnDemonWave();
            }

            // Update particles
            state.particles = state.particles.filter(p => {
                p.update();
                return p.life > 0;
            });

            // Check game over
            if (state.player.health <= 0) {
                state.gameOver = true;
                document.getElementById('gameOverScreen').style.display = 'block';
                document.getElementById('finalScore').textContent = String(Math.floor(state.score)).padStart(7, '0');
            }
        }

        function spawnDemonWave() {
            const demonCount = 3 + state.level * 2;
            const types = Object.keys(DEMON_TYPES);
            
            for (let i = 0; i < demonCount; i++) {
                let x, y, valid = false;
                while (!valid) {
                    x = Math.floor(Math.random() * (GRID_WIDTH - 4)) + 2;
                    y = Math.floor(Math.random() * (GRID_HEIGHT - 4)) + 2;
                    const distance = Math.sqrt((x - state.player.x) ** 2 + (y - state.player.y) ** 2);
                    valid = distance > 5 && !state.walls.find(w => w.x === x && w.y === y);
                }
                
                const type = state.level < 3 ? 'IMP' : state.level < 6 ? types[Math.floor(Math.random() * 2)] : types[Math.floor(Math.random() * 3)];
                state.demons.push(new Demon(x, y, type));
            }
        }

        // Draw game
        function draw() {
            // Dark hellish background
            ctx.fillStyle = '#1a0000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Scanlines effect
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.height; i += 3) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Draw walls
            ctx.fillStyle = '#440000';
            for (let wall of state.walls) {
                ctx.fillRect(wall.x * TILE_SIZE, wall.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                ctx.strokeStyle = '#660000';
                ctx.strokeRect(wall.x * TILE_SIZE, wall.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }

            // Draw particles
            for (let p of state.particles) {
                p.draw();
            }

            // Draw projectiles
            for (let proj of state.projectiles) {
                ctx.fillStyle = proj.isEnemy ? '#ff6600' : '#ffff00';
                ctx.beginPath();
                ctx.arc(proj.x * TILE_SIZE, proj.y * TILE_SIZE, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw demons
            for (let demon of state.demons) {
                demon.draw();
            }

            // Draw player
            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🔫', state.player.x * TILE_SIZE + TILE_SIZE / 2, state.player.y * TILE_SIZE + TILE_SIZE / 2);

            // Update HUD
            document.getElementById('score').textContent = String(Math.floor(state.score)).padStart(7, '0');
            const totalHealth = state.player.health + state.player.armor;
            document.getElementById('healthFill').style.width = Math.max(0, totalHealth) + '%';
            document.getElementById('waveNum').textContent = String(state.level).padStart(2, '0');
            document.getElementById('enemyCount').textContent = String(state.demons.length).padStart(2, '0');
        }

        // 8-bit jingle (derpy looping version)
        let audioContext = null;
        let jinglePlayed = false;

        function playJingle() {
            if (jinglePlayed) return;
            jinglePlayed = true;
            
            try {
                // Initialize audio context on first user interaction
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                function playMelody() {
                    const ctx = audioContext;
                    
                    // Create master gain to control volume
                    const masterGain = ctx.createGain();
                    masterGain.gain.value = 0.5;
                    masterGain.connect(ctx.destination);
                    
                    // Base frequencies - will be detuned
                    const baseNotes = [
                        { freq: 500, duration: 0.15 },
                        { freq: 650, duration: 0.15 },
                        { freq: 800, duration: 0.15 },
                        { freq: 1050, duration: 0.3 },
                        { freq: 520, duration: 0.15 },
                        { freq: 1000, duration: 0.4 },
                        { freq: 530, duration: 0.15 },
                        { freq: 670, duration: 0.3 },
                        { freq: 790, duration: 0.15 },
                        { freq: 1080, duration: 0.3 },
                        { freq: 510, duration: 0.15 }
                    ];
                    
                    let currentTime = ctx.currentTime;
                    let totalDuration = 0;
                    
                    baseNotes.forEach((note, index) => {
                        // Add random detune (±30-80Hz) to make it derpy
                        const detune = (Math.random() - 0.5) * 160 - 30;
                        const freq = note.freq + detune;
                        
                        // Add random timing jitter (±20ms)
                        const timingJitter = (Math.random() - 0.5) * 0.04;
                        const duration = Math.max(0.05, note.duration + timingJitter);
                        
                        // Occasional dropped notes for extra derp
                        if (Math.random() > 0.85) {
                            currentTime += duration;
                            totalDuration += duration;
                            return;
                        }
                        
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        
                        osc.connect(gain);
                        gain.connect(masterGain);
                        
                        osc.type = 'square'; // 8-bit square wave
                        osc.frequency.value = Math.max(50, freq); // Clamp to prevent negative
                        
                        gain.gain.setValueAtTime(1, currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, currentTime + duration);
                        
                        osc.start(currentTime);
                        osc.stop(currentTime + duration);
                        
                        currentTime += duration;
                        totalDuration += duration;
                    });
                    
                    // Schedule next loop
                    setTimeout(() => {
                        playMelody();
                    }, totalDuration * 1000 + 200);
                }
                
                playMelody();
            } catch (e) {
                console.log('Audio context not available:', e);
            }
        }

        // Main loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Initialize game
        generateMaze();
        spawnDemonWave();
        gameLoop();
        
        // Play jingle on first user interaction
        document.addEventListener('click', playJingle, { once: true });
        document.addEventListener('keydown', playJingle, { once: true });
    </script>
</body>
</html>
