<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOM — Original 1993</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #dos {
            width: 100%;
            height: 100%;
            display: block;
        }

        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .splash.hidden {
            display: none;
        }

        .splash-image {
            max-width: 90%;
            max-height: 60%;
            margin-bottom: 30px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 20px #00ff00;
        }

        .splash-button {
            padding: 5px 21px;
            background: #000;
            color: #00ff00;
            border: 2px solid #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 10px #00ff00;
            transition: all 0.2s;
            min-width: 320px;
        }

        .splash-button:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 20px #00ff00;
        }

        .splash-button:active {
            transform: scale(0.95);
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            border: 2px solid #00ff00;
            padding: 40px;
            text-align: center;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            z-index: 9999;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .loading h2 {
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00ff00;
        }

        .loading-bar {
            width: 300px;
            height: 20px;
            border: 1px solid #00ff00;
            background: #000;
            margin: 20px auto;
            overflow: hidden;
        }

        .loading-fill {
            height: 100%;
            background: #00ff00;
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 10px #00ff00;
        }

        .error-screen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            border: 2px solid #ff0000;
            padding: 40px;
            text-align: center;
            color: #ff0000;
            font-family: 'Courier New', monospace;
            z-index: 9999;
            display: none;
            max-width: 500px;
        }

        .error-screen.show {
            display: block;
        }

        .error-screen h2 {
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #ff0000;
        }

        .error-screen p {
            color: #00ff00;
            margin: 10px 0;
        }

        .button-group {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .error-button {
            padding: 10px 20px;
            background: #000;
            color: #00ff00;
            border: 1px solid #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }

        .error-button:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }

        .info {
            position: fixed;
            top: 10px;
            left: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #00ff00;
            z-index: 1000;
            text-shadow: 0 0 10px #00ff00;
            letter-spacing: 1px;
        }

        .info-hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="dos"></div>
    
    <!-- DOOM Boot Music -->
    <audio id="doomMusic" src="Music/Start/Doom music.mp3" loop preload="auto"></audio>
    
    <!-- Splash screen with image and start button -->
    <div class="splash" id="splash">
        <img src="Doom.jpg" alt="DOOM" class="splash-image">
        <button class="splash-button" id="startBtn">ENTER HELL</button>
        <button class="splash-button" id="changeMindBtn">CHANGE MIND</button>
    </div>
    
    <!-- Loading screen -->
    <div class="loading" id="loading">
        <h2>║ DOOM ║</h2>
        <p>LOADING ORIGINAL 1993 EXPERIENCE</p>
        <div class="loading-bar">
            <div class="loading-fill" id="loadingFill"></div>
        </div>
        <p style="margin-top: 20px; font-size: 14px;">Please wait...</p>
    </div>

    <!-- Error screen -->
    <div class="error-screen" id="errorScreen">
        <h2>║ ERROR ║</h2>
        <p>Unable to load DOOM emulator</p>
        <p style="font-size: 12px; margin-top: 15px;">This requires a live internet connection.</p>
        <div class="button-group">
            <button class="error-button" onclick="window.location.href='dQw4w9WgXcQ.html'">Try Alternative</button>
            <button class="error-button" onclick="window.location.href='index.html'">Return to Main</button>
        </div>
    </div>

    <div class="info" id="info">
        DOOM v1.9 — PRESS ESC TO QUIT
    </div>

    <script>
        let isLoading = false;

        // Attach button listener immediately
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('startBtn').addEventListener('click', startDoom);
            document.getElementById('changeMindBtn').addEventListener('click', () => {
                window.location.href = '../../index.html';
            });
        });

        function startDoom() {
            if (isLoading) return;
            isLoading = true;
            
            // Start playing DOOM music
            const music = document.getElementById('doomMusic');
            if (music) {
                music.currentTime = 0;
                const playPromise = music.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        console.log('DOOM music playing');
                    }).catch(e => {
                        console.error('Audio playback failed:', e);
                    });
                }
            }
            
            document.getElementById('splash').classList.add('hidden');
            document.getElementById('loading').classList.add('show');
            
            // Simulate loading progress slowly
            const loadingFill = document.getElementById('loadingFill');
            let progress = 0;
            const progressInterval = setInterval(() => {
                if (progress < 88) {
                    progress += Math.random() * 3; // Much slower increment
                    loadingFill.style.width = Math.min(88, progress) + '%';
                }
            }, 600); // Even slower interval

            // Show full loading bar then switch to error with fallback options
            setTimeout(() => {
                loadingFill.style.width = '100%';
                setTimeout(() => {
                    clearInterval(progressInterval);
                    document.getElementById('loading').classList.remove('show');
                    document.getElementById('errorScreen').classList.add('show');
                }, 2000);
            }, 8000);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Escape') {
                const splash = document.getElementById('splash');
                const loading = document.getElementById('loading');
                const error = document.getElementById('errorScreen');
                
                if (!splash.classList.contains('hidden')) {
                    // On splash screen, do nothing
                } else if (loading.classList.contains('show')) {
                    // On loading screen, cancel and return to splash
                    location.reload();
                } else if (error.classList.contains('show')) {
                    // On error screen, return to main
                    window.location.href = 'index.html';
                }
            }
        });
    </script>
</body>
</html>
